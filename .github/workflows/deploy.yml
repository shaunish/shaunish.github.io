name: Deploy Site

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rename _app to avoid Jekyll processing
        run: |
          mv olist/_app olist/app
          find olist/ -name "*.html" -exec sed -i 's|/_app/|/app/|g' {} +
          find olist/ -name "*.js" -exec sed -i 's|/_app/|/app/|g' {} +

      - name: Add .nojekyll to olist folder
        run: touch olist/.nojekyll

      - name: Build Jekyll site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site/

  deploy-pages:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4